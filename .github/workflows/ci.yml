name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  fast:
    name: Unit Tests (fast)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run ruff
      run: ruff check .

    - name: Run black check
      run: black --check .

    - name: Run mypy
      run: |
        mypy mcp_server.py config.py logger.py memory_manager.py incremental_indexing.py memory_limited_indexer.py --ignore-missing-imports

    - name: Run unit tests (no ML model)
      run: |
        pytest -m "not integration" --cov=. --cov-report=term-missing --cov-fail-under=80

  integration:
    name: Integration Tests (slow, ML model)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache HuggingFace ML model
      uses: actions/cache@v3
      with:
        path: ~/.cache/huggingface
        key: hf-flax-codesearch-distilroberta-v1

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run integration tests
      run: |
        pytest -m integration --timeout=300 -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install bandit
      run: pip install bandit

    - name: Run security check
      run: |
        bandit -r mcp_server.py config.py logger.py incremental_indexing.py memory_limited_indexer.py -ll
      continue-on-error: true
